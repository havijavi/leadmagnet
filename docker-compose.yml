services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadmagnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadmagnet}
      POSTGRES_DB: ${POSTGRES_DB:-leadmagnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadmagnet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leadmagnet}:${POSTGRES_PASSWORD:-leadmagnet}@postgres:5432/${POSTGRES_DB:-leadmagnet}
      REDIS_URL: redis://redis:6379/0
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_API_KEY: ${LLM_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-LeadMagnet}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY:-4}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-}
      SEARXNG_URL: ${SEARXNG_URL:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      SNOV_CLIENT_ID: ${SNOV_CLIENT_ID:-}
      SNOV_CLIENT_SECRET: ${SNOV_CLIENT_SECRET:-}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - crawler_cache:/root/.crawl4ai
    shm_size: 1gb

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # Spreadsheet-style UI on top of the same Postgres — point it at the
  # leads / outreach_messages / target_lists tables for a Clay-like view.
  # Open http://<host>:8080 and connect using DATABASE_URL credentials.
  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER:-leadmagnet}&p=${POSTGRES_PASSWORD:-leadmagnet}&d=${POSTGRES_DB:-leadmagnet}"
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-changeme-jwt-secret}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://localhost:8080}
    ports:
      - "${NOCODB_PORT:-8080}:8080"
    volumes:
      - nocodb_data:/usr/app/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - frontend
      - backend
      - nocodb
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
      NOCODB_DOMAIN: ${NOCODB_DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  nocodb_data:
  crawler_cache:
